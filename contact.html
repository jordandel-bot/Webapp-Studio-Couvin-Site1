<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Site 1 - Contactez-nous !</title>
  </head>

  <body>
    <header>
      <h1>Contactez-nous !</h1>
      <nav>
        <a href="index.html">Accueil</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>
    <hr />
    <main>
      <section>
        <h2>Contactez-nous</h2>
        <div class="colonnes">
          <div class="colonne">
            Formulaire :
            <h3>Par mail</h3>
            <form>
              <div class="control">
                <label for="lastname">Nom :</label>
                <input type="text" id="lastname" required />*
              </div>
              <div class="control">
                <label for="firstname">Prénom :</label>
                <input type="text" id="firstname" />
              </div>
              <div class="control">
                <label for="email">Email :</label>
                <input
                  type="email"
                  required
                  id="email"
                  placeholder="user@gmail.com"
                />*
              </div>
              <div class="control">
                <label for="profil">Profil :</label>
                <select name="" id="profil">
                  <option value="DE">Demandeur d'emploi</option>
                  <option value="TRAV">Travailleur</option>
                </select>
              </div>
              <div class="control">
                <label for="message">Message :</label>
                <textarea name="" id="message"></textarea>*
              </div>
              <div class="control">
                <button>Envoyer</button>
              </div>
            </form>
          </div>
          <div class="colonne">
            <iframe
              width="425"
              height="350"
              src="https://www.openstreetmap.org/export/embed.html?bbox=4.464097023010255%2C50.037462148604504%2C4.520745277404786%2C50.06220819627452&amp;layer=mapnik"
              style="border: 1px solid black"
            ></iframe
            ><br /><small
              ><a href="https://www.openstreetmap.org/?#map=15/50.04984/4.49242"
                >View Larger Map</a
              ></small
            >
          </div>
        </div>
      </section>
      <hr />
    </main>
    <footer>&copy; Cepegra - 2026</footer>
  </body>
</html>
